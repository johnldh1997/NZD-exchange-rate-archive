name: Fetch Exchange Rates

on:
  schedule:
    - cron: "0 19 * * 0-4"  # ~8am NZDT, Mon-Fri NZ time (Sun-Thu UTC)
    - cron: "0 20 * * 0-4"  # ~8am NZST, Mon-Fri NZ time (Sun-Thu UTC)
  workflow_dispatch: # also allows manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    env:
      TZ: Pacific/Auckland # runner's local clock follows NZ time (handles DST automatically)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        env:
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python fetch_rates.py
